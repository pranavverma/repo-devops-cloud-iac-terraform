name: Terraform CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "us-east-1"

jobs:
  validate:
    name: Format & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Validate modules
        run: |
          for mod in modules/*/; do
            echo "Validating $mod ..."
            terraform -chdir="$mod" init -backend=false -input=false
            terraform -chdir="$mod" validate
          done

  plan-dev:
    name: Plan Dev
    runs-on: ubuntu-latest
    needs: validate
    environment: dev
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform -chdir=environments/dev init

      - name: Terraform Plan
        run: |
          terraform -chdir=environments/dev plan \
            -var="container_image=${{ secrets.CONTAINER_IMAGE }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -no-color
        continue-on-error: true

  apply-prod:
    name: Apply Production
    runs-on: ubuntu-latest
    needs: validate
    environment: prod
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform -chdir=environments/prod init

      - name: Terraform Apply
        run: |
          terraform -chdir=environments/prod apply -auto-approve \
            -var="container_image=${{ secrets.CONTAINER_IMAGE }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}"
